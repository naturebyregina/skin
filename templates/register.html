{% extends "base.html" %}
{% block title %}Create Account — Nature by Regina{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card reveal">
        <span class="eyebrow">Join the family</span>
        <h1>Create Account</h1>
        <p>Earn loyalty points, save favourites and track orders.</p>
        <form onsubmit="handleRegister(event)">
            <div class="row-2">
                <div class="field"><label>First Name</label><input type="text" id="first_name" required></div>
                <div class="field"><label>Last Name</label><input type="text" id="last_name" required></div>
            </div>
            <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com" required></div>
            <div class="field"><label>Password</label><input type="password" id="password" placeholder="Create a password" required></div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            <div class="form-error" id="error"></div>
        </form>
        <div class="form-foot">Already have an account? <a href="/login">Sign in</a></div>
    </div>
</div>
{% endblock %}
