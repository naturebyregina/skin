{% extends "base.html" %}
{% block title %}Sign In — Nature by Regina{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card reveal">
        <span class="eyebrow">Welcome back</span>
        <h1>Sign In</h1>
        <p>Continue your skincare journey with us.</p>
        <form onsubmit="handleLogin(event)">
            <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com" required></div>
            <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            <div class="form-error" id="error"></div>
        </form>
        <div class="form-foot">New here? <a href="/register">Create an account</a></div>
    </div>
</div>
{% endblock %}
